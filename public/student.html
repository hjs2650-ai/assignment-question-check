<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>과제 클리어체크</title>
    <meta name="description" content="도와줘요 쌤 문제를 체크하고 과제 사진을 첨부해 주세요." />
    <meta property="og:title" content="과제 클리어체크" />
    <meta property="og:description" content="도와줘요 쌤 문제를 체크하고 과제 사진을 첨부해 주세요." />
    <meta property="og:image" content="/assets/teacher-character.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="과제 클리어체크" />
    <meta name="twitter:description" content="도와줘요 쌤 문제를 체크하고 과제 사진을 첨부해 주세요." />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell student-shell">
      <section class="student-hero">
        <div class="student-class-pill" id="className">반 확인 중</div>
        <img class="hero-character" src="/assets/teacher-character.png" alt="" />
        <div class="hero-copy">
          <p class="eyebrow">오늘의 미션</p>
          <h1 id="title">과제 불러오는 중</h1>
          <p id="rangeText" class="range-text"></p>
          <p id="detail" class="muted"></p>
        </div>
      </section>

      <section class="panel">
        <form id="responseForm">
          <label>
            이름
            <input id="studentName" placeholder="예: 홍길동" autocomplete="name" required />
          </label>
          <div id="submissionTabs" class="submission-tabs" role="tablist" aria-label="과제 제출 종류">
            <button id="currentSubmissionTab" class="submission-tab is-active" type="button" role="tab" aria-selected="true" aria-controls="currentSubmissionPanel">오늘 과제 제출</button>
            <button id="pastSubmissionTab" class="submission-tab" type="button" role="tab" aria-selected="false" aria-controls="pastAssignmentWrap">지난 과제 제출</button>
          </div>

          <section id="currentSubmissionPanel" class="current-submission-panel" role="tabpanel" aria-labelledby="currentSubmissionTab">
            <div class="section-head">
              <h2>도와줘요 쌤</h2>
              <span id="checkedCount" class="badge">0개 선택</span>
            </div>
            <div id="problemGrid" class="check-grid"></div>
            <div class="photo-upload">
              <strong>과제 사진 첨부</strong>
              <div class="photo-actions">
                <label class="photo-picker">
                  앨범에서 여러 장 선택
                  <input id="photoFiles" type="file" accept="image/*" multiple />
                </label>
                <label class="photo-picker camera">
                  카메라로 사진 추가
                  <input id="photoCamera" type="file" accept="image/*" capture="environment" />
                </label>
              </div>
              <span class="muted">최대 20장까지 첨부할 수 있습니다. 카메라로 찍은 사진도 계속 추가됩니다.</span>
            </div>
            <div id="photoList" class="photo-list"></div>
            <button class="primary full" type="submit">오늘 과제 제출하기</button>
            <p id="message" class="message"></p>
          </section>

          <section id="pastAssignmentWrap" class="past-assignment-panel" role="tabpanel" aria-labelledby="pastSubmissionTab" hidden>
            <div class="section-head compact">
              <h2>지난과제 제출</h2>
            </div>
            <label>
              제출할 과제
              <select id="pastAssignmentSelect"></select>
            </label>
            <section id="pastProblemWrap" class="past-problem-wrap" hidden>
              <div class="section-head compact">
                <h3>도와줘요 쌤</h3>
                <span id="pastCheckedCount" class="badge">0개 선택</span>
              </div>
              <div id="pastProblemGrid" class="check-grid past-check-grid"></div>
            </section>
            <div class="photo-upload">
              <strong>지난과제 사진 첨부</strong>
              <div class="photo-actions">
                <label class="photo-picker">
                  앨범에서 여러 장 선택
                  <input id="pastPhotoFiles" type="file" accept="image/*" multiple />
                </label>
                <label class="photo-picker camera">
                  카메라로 사진 추가
                  <input id="pastPhotoCamera" type="file" accept="image/*" capture="environment" />
                </label>
              </div>
              <span class="muted">최대 20장까지 첨부할 수 있습니다. 선택한 날짜의 과제 제출로 기록됩니다.</span>
            </div>
            <div id="pastPhotoList" class="photo-list"></div>
            <button id="pastSubmitBtn" class="secondary full" type="button">지난과제 제출하기</button>
            <p id="pastMessage" class="message"></p>
          </section>
        </form>
      </section>
    </main>

    <script src="/student.js"></script>
  </body>
</html>
