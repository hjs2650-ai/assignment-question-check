<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>배경 테마 미리보기</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">미리보기</p>
          <h1>배경 테마</h1>
        </div>
      </section>
      <section class="theme-preview-grid">
        <article class="theme-card theme-focus">
          <div class="mini-panel">
            <p class="eyebrow">추천 1</p>
            <h2>집중</h2>
            <p>가장 무난하고 깔끔한 기본 테마</p>
            <div class="mini-checks"><span>1번</span><span>2번</span><span>3번</span></div>
          </div>
        </article>
        <article class="theme-card theme-fresh">
          <div class="mini-panel">
            <p class="eyebrow">추천 2</p>
            <h2>산뜻</h2>
            <p>밝고 가벼운 느낌의 테마</p>
            <div class="mini-checks"><span>1번</span><span>2번</span><span>3번</span></div>
          </div>
        </article>
        <article class="theme-card theme-paper">
          <div class="mini-panel">
            <p class="eyebrow">추천 3</p>
            <h2>노트</h2>
            <p>공책 느낌이 나는 학습용 테마</p>
            <div class="mini-checks"><span>1번</span><span>2번</span><span>3번</span></div>
          </div>
        </article>
        <article class="theme-card theme-night">
          <div class="mini-panel">
            <p class="eyebrow">추천 4</p>
            <h2>차분</h2>
            <p>어두운 배경의 차분한 테마</p>
            <div class="mini-checks"><span>1번</span><span>2번</span><span>3번</span></div>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
