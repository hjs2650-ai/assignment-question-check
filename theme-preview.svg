<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#f5f7fb"/>
  <text x="54" y="70" font-family="Segoe UI, Malgun Gothic, Arial" font-size="38" font-weight="800" fill="#172033">배경 테마 추천</text>
  <text x="54" y="106" font-family="Segoe UI, Malgun Gothic, Arial" font-size="18" fill="#697386">학생들이 보는 과제 체크 화면의 느낌입니다.</text>

  <defs>
    <linearGradient id="focusBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f9ff"/>
      <stop offset="1" stop-color="#edf5f3"/>
    </linearGradient>
    <pattern id="freshLines" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="18" height="18" fill="#eef8f5"/>
      <rect width="2" height="18" fill="#d5eee8"/>
    </pattern>
    <pattern id="paperLines" width="42" height="32" patternUnits="userSpaceOnUse">
      <rect width="42" height="32" fill="#fbfcff"/>
      <line x1="0" y1="31" x2="42" y2="31" stroke="#dbe8ff" stroke-width="1"/>
      <line x1="1" y1="0" x2="1" y2="32" stroke="#f0d4d4" stroke-width="1"/>
    </pattern>
    <linearGradient id="nightBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#163742"/>
    </linearGradient>
  </defs>

  <g transform="translate(54 140)">
    <rect x="0" y="0" width="520" height="250" rx="12" fill="url(#focusBg)" stroke="#dce3ee"/>
    <circle cx="80" cy="50" r="110" fill="#2364d2" opacity=".12"/>
    <circle cx="430" cy="60" r="105" fill="#0f8f7a" opacity=".12"/>
    <rect x="28" y="102" width="464" height="112" rx="10" fill="#ffffff" opacity=".9" stroke="#dce3ee"/>
    <text x="52" y="138" font-family="Segoe UI, Malgun Gothic, Arial" font-size="16" font-weight="800" fill="#2364d2">추천 1</text>
    <text x="52" y="172" font-family="Segoe UI, Malgun Gothic, Arial" font-size="30" font-weight="800" fill="#172033">집중</text>
    <text x="52" y="202" font-family="Segoe UI, Malgun Gothic, Arial" font-size="17" fill="#697386">가장 무난하고 깔끔한 기본 테마</text>
    <rect x="622" y="0" width="520" height="250" rx="12" fill="url(#freshLines)" stroke="#dce3ee"/>
    <rect x="650" y="102" width="464" height="112" rx="10" fill="#ffffff" opacity=".9" stroke="#dce3ee"/>
    <text x="674" y="138" font-family="Segoe UI, Malgun Gothic, Arial" font-size="16" font-weight="800" fill="#0f8f7a">추천 2</text>
    <text x="674" y="172" font-family="Segoe UI, Malgun Gothic, Arial" font-size="30" font-weight="800" fill="#172033">산뜻</text>
    <text x="674" y="202" font-family="Segoe UI, Malgun Gothic, Arial" font-size="17" fill="#697386">밝고 가벼운 느낌의 테마</text>
  </g>

  <g transform="translate(54 430)">
    <rect x="0" y="0" width="520" height="250" rx="12" fill="url(#paperLines)" stroke="#dce3ee"/>
    <rect x="28" y="102" width="464" height="112" rx="10" fill="#ffffff" opacity=".9" stroke="#dce3ee"/>
    <text x="52" y="138" font-family="Segoe UI, Malgun Gothic, Arial" font-size="16" font-weight="800" fill="#2364d2">추천 3</text>
    <text x="52" y="172" font-family="Segoe UI, Malgun Gothic, Arial" font-size="30" font-weight="800" fill="#172033">노트</text>
    <text x="52" y="202" font-family="Segoe UI, Malgun Gothic, Arial" font-size="17" fill="#697386">공책 느낌이 나는 학습용 테마</text>
    <rect x="622" y="0" width="520" height="250" rx="12" fill="url(#nightBg)" stroke="#29485a"/>
    <rect x="650" y="102" width="464" height="112" rx="10" fill="#ffffff" opacity=".11" stroke="#ffffff" stroke-opacity=".22"/>
    <text x="674" y="138" font-family="Segoe UI, Malgun Gothic, Arial" font-size="16" font-weight="800" fill="#9ee5d6">추천 4</text>
    <text x="674" y="172" font-family="Segoe UI, Malgun Gothic, Arial" font-size="30" font-weight="800" fill="#f4f7fb">차분</text>
    <text x="674" y="202" font-family="Segoe UI, Malgun Gothic, Arial" font-size="17" fill="#c4ccd8">어두운 배경의 차분한 테마</text>
  </g>
</svg>
